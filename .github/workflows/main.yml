name: AutoFlow EXE Derle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Kutuphaneleri Kur
      run: |
        pip install keyboard mouse pyinstaller
    
    - name: EXE Derle
      run: |
        pyinstaller --onefile --noconsole --name "AutoFlow" --hidden-import keyboard --hidden-import mouse --uac-admin autoflow.py
    
    - name: EXE Yukle
      uses: actions/upload-artifact@v4
      with:
        name: AutoFlow-Windows
        path: dist/AutoFlow.exe
